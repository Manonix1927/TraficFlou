<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}TrafficFlow{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .sidebar-link {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.625rem 1rem; border-radius: 0.5rem;
      color: rgb(203 213 225); font-size: 0.875rem; font-weight: 500;
      transition: all 0.15s; text-decoration: none;
    }
    .sidebar-link:hover { background: rgb(51 65 85); color: #fff; }
    .sidebar-link.active { background: rgb(37 99 235); color: #fff; }
    .input-field {
      width: 100%; background-color: rgb(15 23 42);
      border: 1px solid rgb(71 85 105); border-radius: 0.5rem;
      padding: 0.625rem 1rem; color: #fff; font-size: 0.875rem;
      transition: border-color 0.15s; outline: none;
    }
    .input-field:focus { border-color: rgb(59 130 246); box-shadow: 0 0 0 1px rgb(59 130 246); }
    .input-field option { background-color: rgb(15 23 42); color: #fff; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex">

{% if user is defined %}
<!-- Sidebar -->
<aside class="w-60 min-h-screen bg-slate-800 border-r border-slate-700 flex flex-col fixed top-0 left-0 bottom-0 z-20">
  <div class="px-6 py-5 border-b border-slate-700">
    <span class="text-xl font-bold text-white">Traffic<span class="text-blue-400">Flow</span></span>
  </div>
  <nav class="flex-1 p-3 space-y-1 mt-2">
    <a href="/dashboard" class="sidebar-link {% if request.url.path == '/dashboard' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7h18M3 12h18M3 17h18"/></svg>
      Проекты
    </a>
    <a href="/projects/create" class="sidebar-link">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Новый проект
    </a>
    {% if user.is_admin %}
    <a href="/admin" class="sidebar-link {% if '/admin' in request.url.path %}active{% endif %}" style="color:rgb(248 113 113);">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      Админ
    </a>
    {% endif %}
    <a href="/billing" class="sidebar-link {% if request.url.path == '/billing' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Баланс
    </a>
  </nav>
  <div class="p-3 border-t border-slate-700">
    <div class="flex items-center gap-3 px-3 py-2 mb-2">
      <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold">
        {{ user.email[0].upper() }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm text-white truncate">{{ user.email }}</p>
        <p class="text-xs text-slate-400">{{ user.credits }} кредитов</p>
      </div>
    </div>
    <a href="/logout" class="sidebar-link text-red-400 hover:text-red-300 hover:bg-red-900/20">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Выйти
    </a>
  </div>
</aside>
{% endif %}

<!-- Main content -->
<main class="flex-1 {% if user is defined %}ml-60{% endif %} min-h-screen">
  {% block content %}{% endblock %}
</main>

</body>
</html>
