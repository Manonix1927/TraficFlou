{% extends "base.html" %}
{% block title %}Регистрация — TrafficFlow{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-900">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white">Traffic<span class="text-blue-400">Flow</span></h1>
      <p class="text-slate-400 mt-2 text-sm">Управление трафиком для GA4</p>
    </div>
    <div class="bg-slate-800 rounded-2xl p-8 border border-slate-700 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">Создать аккаунт</h2>
      {% if error %}
      <div class="bg-red-900/40 border border-red-700 text-red-300 text-sm rounded-lg px-4 py-3 mb-4">{{ error }}</div>
      {% endif %}
      <form method="post" action="/register" class="space-y-4">
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">Email</label>
          <input name="email" type="email" required
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"/>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">Пароль</label>
          <input name="password" type="password" required minlength="8"
            class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition"/>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg transition text-sm mt-2">
          Зарегистрироваться
        </button>
      </form>
      <p class="text-center text-slate-400 text-sm mt-6">
        Есть аккаунт? <a href="/login" class="text-blue-400 hover:underline">Войти</a>
      </p>
      <p class="text-center text-slate-500 text-xs mt-3">🎁 100 бесплатных кредитов при регистрации</p>
    </div>
  </div>
</div>
{% endblock %}
