{% extends "base.html" %}
{% block title %}Новый проект — TrafficFlow{% endblock %}
{% block content %}
<div class="p-8 max-w-3xl">
  <div class="mb-8">
    <a href="/dashboard" class="text-slate-400 hover:text-white text-sm flex items-center gap-1 mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Назад
    </a>
    <h1 class="text-2xl font-bold text-white">Новый проект</h1>
    <p class="text-slate-400 text-sm mt-1">Настройте параметры трафика для вашего сайта</p>
  </div>

  <form method="post" action="/projects/create" x-data="projectForm()" class="space-y-6">

    <!-- Basic info -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 space-y-4">
      <h2 class="font-semibold text-white">Основная информация</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">Название проекта</label>
          <input name="name" required placeholder="Мой сайт" class="input-field"/>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">URL сайта</label>
          <input name="site_url" required placeholder="https://example.com" class="input-field"/>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">GA4 Measurement ID</label>
          <input name="ga_tid" required placeholder="G-XXXXXXXXXX" class="input-field"/>
        </div>
        <div>
          <label class="block text-sm text-slate-400 mb-1.5">GTM Container ID <span class="text-slate-500">(опционально)</span></label>
          <input name="gtm_id" placeholder="GTM-XXXXXXX" class="input-field"/>
        </div>
      </div>
    </div>

    <!-- Traffic volume + device -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
      <h2 class="font-semibold text-white mb-4">Объём и устройства</h2>
      <div class="grid grid-cols-3 gap-4">
        <div class="col-span-1">
          <label class="block text-sm text-slate-400 mb-1.5">Хитов в день</label>
          <input name="daily_hits" type="number" value="100" min="10" max="100000" class="input-field" x-model="dailyHits"/>
        </div>
        <div class="col-span-2" x-data="deviceForm()">
          <label class="block text-sm text-slate-400 mb-1.5">
            Тип устройства
            <span class="ml-2 text-xs font-semibold" :class="total===100?'text-green-400':'text-red-400'"><span x-text="total"></span>%</span>
          </label>
          <!-- Hidden inputs for reliable form submission -->
          <input type="hidden" name="device_desktop" x-model="items[0].pct">
          <input type="hidden" name="device_mobile"  x-model="items[1].pct">
          <input type="hidden" name="device_tablet"  x-model="items[2].pct">
          <div class="space-y-2">
            <template x-for="(d, i) in items" :key="d.key">
              <div class="flex items-center gap-3">
                <span class="text-sm text-slate-300 w-24 flex-shrink-0" x-text="d.icon+' '+d.label"></span>
                <input type="range" min="0" max="100" x-model.number="d.pct"
                  @input="slide(i)" class="flex-1 accent-green-500"/>
                <span class="text-sm font-semibold text-white w-10 text-right" x-text="d.pct+'%'"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Traffic sources -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-6" x-data="sourcesForm()">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-white">Источники трафика</h2>
        <div class="flex items-center gap-3">
          <span class="text-sm font-semibold" :class="total===100?'text-green-400':'text-red-400'">
            <span x-text="total"></span>%
          </span>
          <button type="button" @click="add()"
            class="text-xs text-blue-400 hover:text-blue-300 border border-blue-700 rounded px-2 py-1">+ Добавить</button>
        </div>
      </div>
      <div class="space-y-3">
        <template x-for="(s, i) in items" :key="i">
          <div class="flex items-center gap-4">
            <select x-model="s.key" name="source_keys"
              style="width:13rem;flex-shrink:0;background:rgb(15 23 42);border:1px solid rgb(71 85 105);border-radius:0.5rem;padding:0.5rem 0.75rem;color:#fff;font-size:0.8rem;outline:none;">
              <optgroup label="Organic Search" style="background:rgb(15 23 42)">
                <option value="google_organic">Google Organic</option>
                <option value="bing_organic">Bing Organic</option>
                <option value="duckduckgo_organic">DuckDuckGo</option>
                <option value="yahoo_organic">Yahoo Organic</option>
                <option value="youtube_organic">YouTube Organic</option>
              </optgroup>
              <optgroup label="Paid" style="background:rgb(15 23 42)">
                <option value="google_cpc">Google Ads (CPC)</option>
              </optgroup>
              <optgroup label="Social" style="background:rgb(15 23 42)">
                <option value="instagram">Instagram</option>
                <option value="facebook">Facebook</option>
                <option value="linkedin">LinkedIn</option>
                <option value="twitter">Twitter / X</option>
                <option value="pinterest">Pinterest</option>
                <option value="tiktok">TikTok</option>
              </optgroup>
              <optgroup label="AI Chatbots" style="background:rgb(15 23 42)">
                <option value="chatgpt">ChatGPT</option>
                <option value="perplexity">Perplexity AI</option>
                <option value="gemini">Google Gemini</option>
                <option value="copilot">Microsoft Copilot</option>
                <option value="grok">Grok</option>
              </optgroup>
              <optgroup label="Messengers" style="background:rgb(15 23 42)">
                <option value="whatsapp">WhatsApp</option>
                <option value="telegram">Telegram</option>
              </optgroup>
              <optgroup label="Other" style="background:rgb(15 23 42)">
                <option value="email">Email</option>
                <option value="direct">Direct</option>
                <option value="referral">Referral</option>
              </optgroup>
            </select>
            <input type="range" min="0" max="100" x-model.number="s.pct" name="source_percents"
              @input="slide(i)" class="flex-1 accent-blue-500"/>
            <span class="text-sm font-semibold text-white w-10 text-right" x-text="s.pct+'%'"></span>
            <button type="button" @click="remove(i)" class="text-slate-500 hover:text-red-400 text-lg leading-none" style="flex-shrink:0;">✕</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Geo targeting -->
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-6" x-data="geoForm()">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-semibold text-white">Гео-таргетинг</h2>
        <div class="flex items-center gap-3">
          <span class="text-sm font-semibold" :class="total===100?'text-green-400':'text-red-400'">
            <span x-text="total"></span>%
          </span>
          <button type="button" @click="addRow()"
            class="text-xs text-blue-400 hover:text-blue-300 border border-blue-700 rounded px-2 py-1">+ Страна</button>
        </div>
      </div>
      <div class="space-y-3">
        <template x-for="(row, i) in items" :key="i">
          <div class="flex items-center gap-4">
            <select name="geo_countries" x-model="row.country"
              style="width:13rem;flex-shrink:0;background:rgb(15 23 42);border:1px solid rgb(71 85 105);border-radius:0.5rem;padding:0.5rem 0.75rem;color:#fff;font-size:0.8rem;outline:none;">
              {% for code, name in countries %}
              <option value="{{ code }}" style="background:rgb(15 23 42);color:#fff;">{{ name }}</option>
              {% endfor %}
            </select>
            <input type="range" min="0" max="100" x-model.number="row.pct" name="geo_percents"
              @input="slide(i)" class="flex-1 accent-purple-500"/>
            <span class="text-sm font-semibold text-white w-10 text-right" x-text="row.pct+'%'"></span>
            <button type="button" @click="remove(i)" class="text-slate-500 hover:text-red-400 text-lg leading-none" style="flex-shrink:0;">✕</button>
          </div>
        </template>
      </div>
    </div>

    <button type="submit"
      class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition">
      Создать проект
    </button>
  </form>
</div>

<style>
  .input-field {
    width: 100%; background-color: rgb(15 23 42);
    border: 1px solid rgb(71 85 105); border-radius: 0.5rem;
    padding: 0.625rem 1rem; color: #fff; font-size: 0.875rem;
    transition: border-color 0.15s; outline: none;
  }
  .input-field:focus { border-color: rgb(59 130 246); box-shadow: 0 0 0 1px rgb(59 130 246); }
  .input-field option { background-color: rgb(15 23 42); color: #fff; }
</style>

<script>
function projectForm() {
  return { dailyHits: 100 }
}

// ── Linked sliders: same logic as project_detail ──────────────
function makeLinked(items) {
  return {
    items,
    get total() { return this.items.reduce((a, b) => a + (b.pct || 0), 0); },

    slide(idx) {
      const val = Math.max(0, Math.min(100, this.items[idx].pct || 0));
      this.items[idx].pct = val;
      const rest = 100 - val;
      const others = this.items.filter((_, i) => i !== idx);
      if (!others.length) return;
      const othersSum = others.reduce((a, b) => a + (b.pct || 0), 0);
      if (othersSum === 0) {
        const share = Math.floor(rest / others.length);
        others.forEach((it, j) => {
          it.pct = share + (j === 0 ? rest - share * others.length : 0);
        });
      } else {
        let alloc = 0;
        others.forEach((it, j) => {
          if (j === others.length - 1) {
            it.pct = Math.max(0, rest - alloc);
          } else {
            it.pct = Math.max(0, Math.round(it.pct / othersSum * rest));
            alloc += it.pct;
          }
        });
      }
    },

    remove(idx) {
      this.items.splice(idx, 1);
      if (!this.items.length) return;
      const t = this.total;
      if (t === 100) return;
      if (t === 0) { this.items[0].pct = 100; return; }
      let alloc = 0;
      this.items.forEach((it, i) => {
        if (i === this.items.length - 1) {
          it.pct = Math.max(0, 100 - alloc);
        } else {
          it.pct = Math.max(0, Math.round(it.pct / t * 100));
          alloc += it.pct;
        }
      });
    }
  };
}

function deviceForm() {
  return makeLinked([
    { key: 'desktop', icon: '🖥', label: 'Desktop', pct: 100 },
    { key: 'mobile',  icon: '📱', label: 'Mobile',  pct: 0 },
    { key: 'tablet',  icon: '📟', label: 'Tablet',  pct: 0 },
  ]);
}

function sourcesForm() {
  const base = makeLinked([
    { key: 'google_organic', pct: 50 },
    { key: 'instagram',      pct: 25 },
    { key: 'direct',         pct: 15 },
    { key: 'facebook',       pct: 10 },
  ]);
  return Object.assign(base, {
    add() { this.items.push({ key: 'google_organic', pct: 0 }); }
  });
}

function geoForm() {
  const base = makeLinked([{ country: 'UA', pct: 100 }]);
  return Object.assign(base, {
    addRow() { this.items.push({ country: 'DE', pct: 0 }); }
  });
}
</script>
{% endblock %}
